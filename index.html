<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --text-main: #000000;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --today-bg: #1a1a1a;
            --today-text: #ffffff;
            --hover-bg: #f3f4f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --text-main: #ffffff;
                --text-muted: #6b7280;
                --border-color: #374151;
                --today-bg: #ffffff;
                --today-text: #000000;
                --hover-bg: #2d2d2d;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calendar-card {
            width: 260px;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .month-label { font-weight: 600; font-size: 1rem; }

        .nav-btns { display: flex; gap: 5px; }

        .btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1.1rem;
        }

        .btn:hover { background: var(--hover-bg); }

        table { width: 100%; border-collapse: collapse; }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            padding-bottom: 10px;
        }

        td {
            text-align: center;
            font-size: 0.9rem;
            width: 35px;
            height: 35px;
            border-radius: 8px;
        }

        .today {
            background-color: var(--today-bg);
            color: var(--today-text);
            font-weight: bold;
        }

        .fade { color: var(--text-muted); opacity: 0.3; }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="header">
        <div class="month-label" id="monthYear"></div>
        <div class="nav-btns">
            <div class="btn" onclick="changeMonth(-1)">‹</div>
            <div class="btn" onclick="changeMonth(1)">›</div>
        </div>
    </div>
    <table>
        <thead>
            <tr><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th><th>Su</th></tr>
        </thead>
        <tbody id="calendarDays"></tbody>
    </table>
</div>

<script>
    let currentDisplayDate = new Date();

    function render() {
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        const realToday = new Date();

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('monthYear').innerText = `${months[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevMonthLastDay = new Date(year, month, 0).getDate();

        const startOffset = firstDay === 0 ? 6 : firstDay - 1;
        const grid = document.getElementById('calendarDays');
        grid.innerHTML = "";

        let html = '<tr>';
        
        // Prev Month
        for (let i = 0; i < startOffset; i++) {
            html += `<td class="fade">${prevMonthLastDay - startOffset + i + 1}</td>`;
        }

        // Current Month
        for (let day = 1; day <= daysInMonth; day++) {
            if ((day + startOffset - 1) % 7 === 0 && day !== 1) html += '</tr><tr>';
            
            const isToday = (day === realToday.getDate() && month === realToday.getMonth() && year === realToday.getFullYear()) ? 'class="today"' : '';
            html += `<td ${isToday}>${day}</td>`;
        }

        // Next Month padding to fill 6 rows
        let remainingCells = 42 - (daysInMonth + startOffset);
        for (let i = 1; i <= remainingCells; i++) {
            if ((daysInMonth + startOffset + i - 1) % 7 === 0) html += '</tr><tr>';
            html += `<td class="fade">${i}</td>`;
        }

        grid.innerHTML = html + '</tr>';
    }

    function changeMonth(step) {
        currentDisplayDate.setMonth(currentDisplayDate.getMonth() + step);
        render();
    }

    render();
</script>
</body>
</html>
