<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aesthetic Calendar Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f6;
      --accent-green: #8e9775;
      --text-main: #1a1a1a;
      --text-dim: #999;
      --border-dark: #888; /* Darker border for the buttons */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
    }

    .cal {
      width: 100%;
      max-width: 380px;
      background: #fff;
      padding: 2.5rem;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.02);
    }

    .cal-header {
      margin-bottom: 1.5rem;
    }

    .cal-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }

    .cal-month {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-style: italic;
      font-weight: 600;
    }

    .nav-group {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      background: none;
      border: 1.5px solid var(--border-dark); /* Darker border */
      cursor: pointer;
      color: #333; /* Darker arrows */
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: #f0f0f0;
      border-color: #111;
    }

    .cal-subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 1.5rem;
    }

    .day-label {
      font-size: 10px;
      text-align: center;
      padding-bottom: 12px;
      color: var(--text-dim);
      font-weight: 700;
    }

    .day-cell {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border-radius: 10px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1.5px solid transparent;
      font-weight: 400;
    }

    /* Today highlight - Green background, white text */
    .day-cell.today {
      background: var(--accent-green);
      color: #ffffff !important;
      font-weight: 600;
    }

    /* Selected day highlight - Green border */
    .day-cell.selected {
      border-color: var(--accent-green);
      color: var(--accent-green);
      font-weight: 600;
    }

    .day-cell.active:hover:not(.today) {
      background: #f5f5f5;
    }

    .day-cell.empty {
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="cal">
  <div class="cal-header">
    <div class="cal-title-row">
      <span class="cal-month" id="month-title"></span>
      <div class="nav-group">
        <button class="nav-btn" id="prev">＜</button>
        <button class="nav-btn" id="next">＞</button>
      </div>
    </div>
    <div class="cal-subtitle" id="subtitle"></div>
  </div>
  <div class="cal-grid">
    <div class="day-label">M</div>
    <div class="day-label">T</div>
    <div class="day-label">W</div>
    <div class="day-label">T</div>
    <div class="day-label">F</div>
    <div class="day-label">S</div>
    <div class="day-label">S</div>
    <div id="days" style="display: contents;"></div>
  </div>
</div>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();
  let cur = { y: now.getFullYear(), m: now.getMonth() };
  let selectedDate = null; 

  function render() {
    const { y, m } = cur;
    document.getElementById('month-title').textContent = MONTHS[m];
    
    const subMonth = MONTHS[m].slice(0,3).toUpperCase();
    document.getElementById('subtitle').textContent = `${subMonth} ${now.getDate()}, ${y}`;

    const firstDay = new Date(y, m, 1).getDay();
    const offset = (firstDay + 6) % 7; 
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    
    const rows = Math.ceil((offset + daysInMonth) / 7);
    const totalCells = rows * 7; 

    let html = '';
    for (let i = 0; i < totalCells; i++) {
      let content = '';
      let cls = 'day-cell';
      const dayNum = i - offset + 1;

      if (i >= offset && i < offset + daysInMonth) {
        content = dayNum;
        cls += ' active';
        
        const isToday = y === now.getFullYear() && m === now.getMonth() && dayNum === now.getDate();
        if (isToday) cls += ' today';

        if (selectedDate && selectedDate.d === dayNum && selectedDate.m === m && selectedDate.y === y) {
            cls += ' selected';
        }
      } else {
        cls += ' empty';
      }
      html += `<div class="${cls}" onclick="selectDay(${dayNum}, ${m}, ${y})">${content}</div>`;
    }
    document.getElementById('days').innerHTML = html;
  }

  window.selectDay = (d, m, y) => {
    if (!d) return;
    selectedDate = { d, m, y };
    render();
  };

  document.getElementById('prev').onclick = () => {
    cur.m--;
    if (cur.m < 0) { cur.m = 11; cur.y--; }
    render();
  };
  document.getElementById('next').onclick = () => {
    cur.m++;
    if (cur.m > 11) { cur.m = 0; cur.y++; }
    render();
  };

  render();
</script>
</body>
</html>
